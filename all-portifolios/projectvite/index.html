<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Catalog Dashboard</title>
    <script>
      (() => {
        const originalFetch = window.fetch.bind(window);
        const oldApiUrl = 'https://api.juninnzxtec.com.br/api/produtos.php';
        const newApiUrl = 'https://www.juninnzxtec.com.br/all-portifolios/api/produtos.php';

        window.fetch = (input, init) => {
          if (typeof input === 'string' && input.startsWith(oldApiUrl)) {
            input = input.replace(oldApiUrl, newApiUrl);
          } else if (input instanceof Request && input.url.startsWith(oldApiUrl)) {
            input = new Request(input.url.replace(oldApiUrl, newApiUrl), input);
          }

          return originalFetch(input, init);
        };
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-CUXddofP.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CJGeFYCa.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
